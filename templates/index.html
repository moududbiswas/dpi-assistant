<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030408;
            --surface: rgba(12, 13, 20, 0.6);
            --surface-solid: #0c0d14;
            --surface-hover: rgba(20, 22, 35, 0.8);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(0, 229, 255, 0.25);
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --accent3: #06d6a0;
            --text: #f0f0f5;
            --text-muted: #5a5a7a;
            --user-bg: rgba(124, 58, 237, 0.12);
            --ai-bg: rgba(0, 229, 255, 0.05);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Refined Ambient Background */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }
        body::before {
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, var(--accent2), transparent 70%);
            animation: floatGlow 12s ease-in-out infinite alternate;
        }
        body::after {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            animation: floatGlow 14s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.15); }
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 14px 24px;
            background: rgba(12, 13, 20, 0.7);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .logo-circle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
            position: relative;
            overflow: hidden;
        }
        .logo-circle::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: shine 4s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .header-text h1 {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1.5px;
        }
        .header-text p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .status-dot {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--accent3);
            font-weight: 500;
            padding: 4px 10px;
            background: rgba(6, 214, 160, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(6, 214, 160, 0.15);
        }
        .status-dot::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent3);
            animation: statusPulse 2.5s ease-in-out infinite;
            box-shadow: 0 0 8px var(--accent3);
        }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.7); }
        }

        /* Chat area */
        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        /* Hide scrollbar but keep functionality */
        #chatbox::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            max-width: 480px;
            width: 100%;
        }
        .welcome-icon {
            font-size: 52px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }
        .welcome h2 {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }
        .welcome p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .quick-btn {
            padding: 10px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            font-family: 'Hind Siliguri', sans-serif;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .quick-btn:hover {
            border-color: var(--border-hover);
            color: var(--accent);
            background: rgba(0, 229, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.1);
        }

        /* Messages */
        .msg-row {
            display: flex;
            margin-bottom: 24px;
            animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            gap: 12px;
            width: 100%;
            max-width: 720px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 4px;
            position: relative;
        }
        .avatar.ai {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }
        .avatar.user {
            background: linear-gradient(135deg, #3b1f8c, #7c3aed);
        }

        .bubble {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.7;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .bubble.ai {
            background: var(--ai-bg);
            border: 1px solid rgba(0, 229, 255, 0.08);
            border-top-left-radius: 4px;
            color: var(--text);
        }
        .bubble.user {
            background: var(--user-bg);
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-top-right-radius: 4px;
            color: var(--text);
        }

        /* Typing indicator */
        .typing-bubble {
            background: var(--ai-bg);
            border: 1px solid rgba(0, 229, 255, 0.08);
            border-radius: 20px;
            border-top-left-radius: 4px;
            padding: 18px 22px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(1) { background: var(--accent); animation-delay: 0s; }
        .typing-dot:nth-child(2) { background: var(--accent2); animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { background: var(--accent3); animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Speaking animation */
        .speaking-wave {
            display: inline-flex;
            gap: 3px;
            align-items: flex-end;
            margin-left: 12px;
            height: 16px;
            vertical-align: middle;
        }
        .wave-bar {
            width: 3px;
            border-radius: 3px;
            background: var(--accent);
            animation: wave 0.8s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 8px; animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Input area */
        .input-area {
            position: relative;
            z-index: 10;
            padding: 16px 20px 28px;
            background: transparent;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            width: 100%;
            max-width: 720px;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 14px 18px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: var(--shadow);
        }
        .input-wrapper:focus-within {
            border-color: var(--border-hover);
            box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.08), var(--shadow);
            transform: translateY(-2px);
        }
        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 15px;
            font-family: 'Hind Siliguri', sans-serif;
            resize: none;
            max-height: 120px;
            line-height: 1.6;
            padding-top: 4px;
        }
        #userInput::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .send-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .send-btn:hover {
            transform: scale(1.08) rotate(-4deg);
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.35);
        }
        .send-btn:hover::before {
            transform: translateX(100%);
        }
        .send-btn:active { transform: scale(0.92); }
        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            position: relative;
            z-index: 1;
        }
        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        /* Mobile */
        @media (max-width: 640px) {
            header { padding: 12px 16px; }
            #chatbox { padding: 20px 16px; }
            .bubble { max-width: 85%; font-size: 14px; padding: 12px 16px; }
            .input-area { padding: 12px 16px 20px; }
            .welcome h2 { font-size: 22px; }
            .welcome p { font-size: 14px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-circle">🎓</div>
    <div class="header-text">
        <h1>DPI ASSISTANT</h1>
        <p>ঢাকা পলিটেকনিক ইনস্টিটিউট · AI সহকারী</p>
    </div>
    <div class="status-dot" id="statusText">অনলাইন</div>
</header>

<div id="chatbox">
    <div class="welcome" id="welcome">
        <span class="welcome-icon">🤖</span>
        <h2>আস্সালামুয়ালাইকুম!</h2>
        <p>আমি DPI Assistant। ঢাকা পলিটেকনিক সম্পর্কে যেকোনো প্রশ্ন করুন — ক্লাস রুটিন, শিক্ষক, বিভাগ সবকিছু!</p>
        <div class="quick-btns">
            <button class="quick-btn" onclick="quickAsk('আজকের ক্লাস রুটিন কী?')">📅 আজকের রুটিন</button>
            <button class="quick-btn" onclick="quickAsk('কোন কোন বিভাগ আছে?')">🏫 বিভাগসমূহ</button>
            <button class="quick-btn" onclick="quickAsk('অফিস সময় কখন?')">🕐 অফিস সময়</button>
            <button class="quick-btn" onclick="quickAsk('ভর্তির নিয়ম কী?')">📝 ভর্তি তথ্য</button>
        </div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="userInput" placeholder="আপনার প্রশ্ন লিখুন..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    <div class="input-hint">Enter চাপুন বা বোতামে ক্লিক করুন</div>
</div>

<script>
    let history = [];
    let isPlaying = false;

    const textarea = document.getElementById('userInput');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function quickAsk(text) {
        document.getElementById('userInput').value = text;
        sendMessage();
    }

    function addMessage(content, role) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const chatbox = document.getElementById('chatbox');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}`;
        avatar.textContent = role === 'ai' ? '🤖' : '🧑';

        const bubble = document.createElement('div');
        bubble.className = `bubble ${role}`;
        bubble.innerHTML = content;

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatbox.appendChild(row);
        chatbox.scrollTop = chatbox.scrollHeight;

        return bubble;
    }

    function addTyping() {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const chatbox = document.getElementById('chatbox');
        const row = document.createElement('div');
        row.className = 'msg-row ai';
        row.id = 'typing-row';

        const avatar = document.createElement('div');
        avatar.className = 'avatar ai';
        avatar.textContent = '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'typing-bubble';
        bubble.innerHTML = `
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        `;

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatbox.appendChild(row);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function playAudio(base64) {
        const audio = new Audio("data:audio/mp3;base64," + base64);
        isPlaying = true;
        audio.play();
        audio.onended = () => { isPlaying = false; };
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message || isPlaying) return;

        input.value = '';
        input.style.height = 'auto';

        addMessage(message, 'user');
        addTyping();

        const statusText = document.getElementById('statusText');
        statusText.textContent = 'ভাবছি...';

        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, history })
            });

            const data = await res.json();
            document.getElementById('typing-row')?.remove();

            const waveHTML = `<span class="speaking-wave">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </span>`;

            const bubble = addMessage(data.reply + waveHTML, 'ai');

            history.push({ role: 'user', content: message });
            history.push({ role: 'assistant', content: data.reply });

            if (data.audio) {
                playAudio(data.audio);
                const audio = new Audio("data:audio/mp3;base64," + data.audio);
                audio.onended = () => {
                    const wave = bubble.querySelector('.speaking-wave');
                    if (wave) wave.remove();
                };
                audio.play();
            }

            statusText.textContent = 'অনলাইন';

        } catch (err) {
            document.getElementById('typing-row')?.remove();
            addMessage('⚠️ সংযোগে সমস্যা হয়েছে। আবার চেষ্টা করুন।', 'ai');
            statusText.textContent = 'অনলাইন';
        }
    }
</script>

</body>
</html>
